<!-- @startingPoint section="Website" subtitle="Dark single-page music artist site" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anneora — voice from the void</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: radial-gradient(circle at 50% -10%, #1a1a1a, #000 60%);
    background-attachment: fixed;
    color: var(--bone-100);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  .grain {
    position: fixed; inset: 0; z-index: 50;
    background: url('../../assets/noise.svg');
    opacity: 0.05; pointer-events: none;
  }
  .nav-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 40; }
  @keyframes drift { from { transform: translateY(16px); filter: blur(8px); } to { transform: none; filter: none; } }
  /* base state is fully visible; entrance animates blur/transform only (opacity stays 1),
     so content is never hidden in print / hidden-tab renders. No transform on the
     sticky dissolve section, so its pin is unaffected. */
  #app-sections > .drift { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    #app-sections > .drift { animation: drift 1100ms cubic-bezier(0.16,1,0.3,1) backwards; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../ds-bundle.js"></script>
<script type="text/babel" src="DropImage.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="AngelDissolve.jsx"></script>
<script type="text/babel" src="MusicSection.jsx"></script>
<script type="text/babel" src="Gallery.jsx"></script>
<script type="text/babel" src="AboutSection.jsx"></script>
<script type="text/babel" src="LiveSection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
  const { NavBar, Button } = window.AnneoraDesignSystem_7f3db2;

  function App() {
    const [scrolled, setScrolled] = React.useState(false);
    const [active, setActive] = React.useState('Music');
    const [playing, setPlaying] = React.useState(null);
    const [progress, setProgress] = React.useState(0);

    React.useEffect(() => {
      const onScroll = () => setScrolled(window.scrollY > 40);
      window.addEventListener('scroll', onScroll);
      return () => window.removeEventListener('scroll', onScroll);
    }, []);

    // fake playback progress
    React.useEffect(() => {
      if (!playing) { setProgress(0); return; }
      const id = setInterval(() => setProgress(p => (p >= 1 ? 0 : p + 0.01)), 250);
      return () => clearInterval(id);
    }, [playing]);

    const toggle = (title) => { setPlaying(p => p === title ? null : title); setProgress(0); };
    const go = (label) => {
      setActive(label);
      const id = label.toLowerCase();
      const el = document.getElementById(id);
      if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
    };

    return (
      <React.Fragment>
        <div className="nav-fixed">
          <NavBar
            links={['Music', 'Visions', 'About', 'Live']}
            active={active}
            onNavigate={go}
            scrolled={scrolled}
            right={<Button size="sm" variant="ghost">Follow</Button>}
          />
        </div>
        <div id="app-sections">
          <window.AngelDissolve />
          <div className="drift"><window.MusicSection playing={playing} progress={progress} onToggle={toggle} /></div>
          <div className="drift"><window.Gallery /></div>
          <div className="drift"><window.AboutSection /></div>
          <div className="drift"><window.LiveSection /></div>
          <div className="drift"><window.Footer /></div>
        </div>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
