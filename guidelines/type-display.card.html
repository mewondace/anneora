<!-- @dsCard group="Type" viewport="700x230" name="Display scale / Cinzel" subtitle="Headings carved in serif" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #050505; font-family: var(--font-display); color: var(--bone-50); }
  .wrap { padding: 26px 28px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .row span { font-family: var(--font-body); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-400); white-space: nowrap; }
  .d { font-weight: 500; letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><div class="d" style="font-size:2.5rem">Display 40</div><span>display</span></div>
    <div class="row"><div class="d" style="font-size:2rem">Heading 32</div><span>h1</span></div>
    <div class="row"><div class="d" style="font-size:1.5rem">Section label 24</div><span>h2</span></div>
    <div class="row"><div class="d" style="font-size:1.25rem">Subheading 20</div><span>h3</span></div>
  </div>
</body>
</html>
