<!-- @dsCard group="Type" viewport="700x180" name="Wordmark / Cinzel" subtitle="Engraved display serif, wide tracking + halo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(circle at top, #1a1a1a, #000); }
  .wrap { padding: 30px 28px; }
  h1 { margin: 0; font-family: var(--font-display); font-weight: 500; font-size: 3.4rem; letter-spacing: .25em; color: var(--bone-50); text-shadow: var(--glow-text); }
  .meta { margin-top: 16px; font-family: var(--font-body); font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--bone-400); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ANNEORA</h1>
    <div class="meta">Cinzel · 500 · tracking 0.25em · glow 0 0 20px</div>
  </div>
</body>
</html>
