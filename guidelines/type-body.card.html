<!-- @dsCard group="Type" viewport="700x220" name="Body scale / Inter" subtitle="Light, quiet sans for reading" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #050505; font-family: var(--font-body); color: var(--bone-100); }
  .wrap { padding: 26px 28px; display: flex; flex-direction: column; gap: 14px; }
  p { margin: 0; font-weight: 300; line-height: 1.6; max-width: 560px; }
  .lead { font-size: 1.125rem; color: var(--bone-50); }
  .body { font-size: 1rem; }
  .sm { font-size: .9rem; color: var(--bone-300); }
  .xs { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; color: var(--bone-400); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="lead">I'm a singer / songwriter creating dark, atmospheric soundscapes.</p>
    <p class="body">Body — Inter Light, 16px, line-height 1.6. Long-form prose sits calm and low-contrast against the void.</p>
    <p class="sm">Caption — 14px, muted bone for secondary detail.</p>
    <p class="xs">Overline · 12px · tracking 0.18em</p>
  </div>
</body>
</html>
