<!-- @dsCard group="Colors" viewport="700x150" name="Ground / Void" subtitle="Near-black surfaces, top→floor" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #000; font-family: var(--font-body); }
  .wrap { display: flex; gap: 0; padding: 22px; }
  .sw { flex: 1; height: 92px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; border: 1px solid var(--veil-08); }
  .sw b { font-size: 11px; font-weight: 500; color: var(--bone-100); letter-spacing: .08em; }
  .sw span { font-size: 10px; color: var(--bone-400); font-family: var(--font-body); }
  .wrap { gap: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--void-900)"><b>900</b><span>#000000</span></div>
    <div class="sw" style="background:var(--void-800)"><b>800</b><span>#0a0a0a</span></div>
    <div class="sw" style="background:var(--void-700)"><b>700</b><span>#121212</span></div>
    <div class="sw" style="background:var(--void-600)"><b>600</b><span>#1a1a1a</span></div>
    <div class="sw" style="background:var(--void-500)"><b>500</b><span>#242424</span></div>
    <div class="sw" style="background:var(--void-400)"><b>400</b><span>#2e2e2e</span></div>
  </div>
</body>
</html>
