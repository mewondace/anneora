<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: radial-gradient(circle at 50% 0%, #1a1a1a, #000); }
  .wrap { height: 100%; min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; }
  h1 { margin: 0; font-family: var(--font-display); font-weight: 500; font-size: 2.8rem; letter-spacing: .28em; color: var(--bone-50); text-shadow: var(--glow-text); }
  .tag { font-family: var(--font-body); font-weight: 300; font-size: .85rem; letter-spacing: .2em; color: var(--bone-300); opacity: .8; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>ANNEORA</h1>
    <div class="tag">voice from the void</div>
  </div>
</body>
</html>
